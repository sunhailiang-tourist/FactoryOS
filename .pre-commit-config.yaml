# See https://pre-commit.com
repos:
  - repo: local
    hooks:
      - id: factoryos-structure-sync
        name: FactoryOS structure snapshot (commit blocker)
        entry: scripts/venv_exec.sh scripts/check_structure_change.py --pre-commit
        language: system
        pass_filenames: false
        stages: [pre-commit]
      - id: factoryos-uv-lock-check
        name: uv lock sync (pyproject ↔ uv.lock)
        entry: scripts/check_uv_lock.sh
        language: system
        files: ^(pyproject\.toml|uv\.lock)$
        pass_filenames: false
        stages: [pre-commit]
      - id: factoryos-harness-auto
        name: FactoryOS harness (auto)
        entry: scripts/venv_exec.sh scripts/check_harness.py --tier auto
        language: system
        pass_filenames: false
      - id: factoryos-static-quality
        name: FactoryOS ruff + pyright
        entry: scripts/venv_exec.sh scripts/check_static_quality.py --allow-missing
        language: system
        pass_filenames: false
        stages: [pre-commit]
      - id: factoryos-gate-contract
        name: FactoryOS contract/workflow pytest
        entry: scripts/pytest_contract_workflow.sh
        language: system
        pass_filenames: false
        stages: [pre-push]
