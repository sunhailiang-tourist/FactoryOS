apiVersion: factoryos.io/v1
kind: SystemRelation
metadata:
  relation_id: sr-CHANGE_ME-erp-example
  tenant_id: CHANGE_ME
  name: ERP 示例（请改名）
  path: A
spec:
  connector:
    pack_id: conn-erp-{vendor}-write
    registry_key: erp/{vendor}/write
    blueprint_ref: catalog/erp/{vendor}/blueprint.yaml
